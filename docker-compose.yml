services:
  server:
    build: ./server
    ports:
      - '3500:3500'
    environment:
      - PORT=3500
    volumes:
      - server_data:/app/data

  client:
    build:
      context: ./client
      args:
        REACT_APP_API_URL: http://localhost:3500
    ports:
      - '5173:5173'
    depends_on:
      - server

volumes:
  server_data:
